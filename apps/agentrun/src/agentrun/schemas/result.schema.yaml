schema_version: 1
required: [schema_version, run_id, outcome, summary, artifacts, errors, validation]
properties:
  schema_version:
    type: integer
  run_id:
    type: string
  outcome:
    enum: [succeeded, failed, blocked, partial, cancelled]
  summary:
    type: string
  artifacts:
    type: array
  errors:
    type: array
  validation:
    type: object
