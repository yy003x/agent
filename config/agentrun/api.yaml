openrouter-openai:
  protocol: openai
  base_url: https://openrouter.ai/api/v1
  api_key_env: OPENROUTER_API_KEY
  headers:
    HTTP-Referer: http://localhost
    X-OpenRouter-Title: agent-runtime
  models:
    glm-5.1:
      profile: api-openrouter-openai-glm-5.1
      model: z-ai/glm-5.1
      label: OpenRouter GLM-5.1 (OpenAI)

openrouter-anthropic:
  protocol: anthropic
  base_url: https://openrouter.ai/api/v1
  api_key_env: OPENROUTER_API_KEY
  api_key_header: Authorization
  api_key_prefix: "Bearer "
  headers:
    HTTP-Referer: http://localhost
    X-OpenRouter-Title: agent-runtime
  models:
    glm-5.1:
      profile: api-openrouter-anthropic-glm-5.1
      model: z-ai/glm-5.1
      label: OpenRouter GLM-5.1 (Anthropic)
