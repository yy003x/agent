defaults:
  session_name: agentrun-agent
  prompt_delivery: paste
  tmux_input_mode: raw
  paste_bracketed: true
  poll_interval_seconds: 0.3
  ready_timeout_seconds: 300
  prompt_idle_timeout_seconds: 300
  prompt_ready_settle_seconds: 2
  prompt_ready_settle_fast_seconds: 0.5
  prompt_stable_timeout_seconds: 10
  session_wait_ready: true
  session_ready_timeout_seconds: 30
  session_ready_settle_seconds: 2
  silence_threshold_seconds: 0.6
  output_rate_window_seconds: 5
  tail_bytes: 1048576
  auto_trust_cwd: []
  timeout_seconds: 0
  result_contract: optional
  env:
    OPENAI_API_KEY: ${OPENROUTER_API_KEY}
    OPENAI_BASE_URL: https://openrouter.ai/api/v1
    OPENAI_MODEL: z-ai/glm-5.1
    ANTHROPIC_API_KEY: ""
    ANTHROPIC_AUTH_TOKEN: ${OPENROUTER_API_KEY}
    ANTHROPIC_BASE_URL: https://openrouter.ai/api
    ANTHROPIC_MODEL: z-ai/glm-5.1
    OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
    OPENROUTER_MODEL: z-ai/glm-5.1
  env_passthrough:
    - OPENROUTER_API_KEY
    - OPENROUTER_HTTP_REFERER
    - OPENROUTER_TITLE

codex:
  command: codex
  args: []
  label: Tmux Codex Session

claude:
  command: claude
  args: []
  label: Tmux Claude Session
